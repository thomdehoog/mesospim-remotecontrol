# Origoa Foundation — full stack in two containers.
#
#   docker compose up -d db                    # start PostgreSQL
#   docker compose run --rm backend origoa-seed   # (optional) seed the demo data
#   docker compose up -d backend               # start the API + SPA
#   open http://localhost:8000
#
# See SETUP.md for the walkthrough.

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: origoa
      POSTGRES_PASSWORD: origoa
      POSTGRES_DB: origoa
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U origoa -d origoa"]
      interval: 3s
      timeout: 3s
      retries: 20

  backend:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      # ltree ships with the standard postgres image; the backend applies its
      # own schema on startup.
      ORIGOA_DSN: postgres://origoa:origoa@db:5432/origoa?sslmode=disable
      ORIGOA_GIT_DIR: /data/repo.git
      ORIGOA_LISTEN: ":8000"
      ORIGOA_STATIC: /app/static
    volumes:
      - repo-data:/data
    ports:
      - "8000:8000"

volumes:
  db-data:
  repo-data:
